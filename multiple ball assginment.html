<!DOCTYPE html>
<html lang="en">
<head>
<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:black;
}

.ball{
    width:50px;
    height:50px;
    border-radius:50%;
    position:absolute;
}

.ball1{
    background:rgb(27, 19, 168);
    animation:bounce 2s infinite alternate;
}

.ball2{
    background:rgb(49, 159, 25);
    animation:move2 2.5s infinite alternate;
}

.ball3{
    background:red;
    animation:move3 3s infinite alternate;
}
.ball4{
    background:yellow;
    animation:move4 3.5s infinite alternate;
}

.ball5{
    background:cyan;
    animation:move5 2.2s infinite alternate;
}

.ball6{
    background:orange;
    animation:move6 0.52s infinite alternate;
}

.ball7{
    background:pink;
    animation:move7 1.6s infinite alternate;
}
.ball8{
    background:rgb(142, 136, 36);
    animation:move8 2.2s infinite alternate;
}

.ball9{
    background:rgb(49, 50, 57);
    animation:move9 0.52s infinite alternate;
}

.ball10{
    background:pink;
    animation:move10 1.6s infinite alternate;
}

@keyframes bounce{
    0%{
        right:100px;
        top:100px;
    }
    100%{
        right:195vh;
        top:90vh;
    }
}

@keyframes move2{
    0%{
        left:0px;
        top:0;
    }
    100%{
        left:195vh;
        top:90vh;
    }
}

@keyframes move3{
    0%{
        left:50px;
        top:0;
    }
    100%{
        left:150vh;
        top:50vh;
    }
}

@keyframes move4{
    0%{
        right:100px;
        top:12px;
    }
    100%{
        left:200vh;
        top:90vh;
    }
}

@keyframes move5{
    0%{
        left:5px;
        top:10px;
    }
    100%{
        left:400vh;
        top:450vh;
    }
}

@keyframes move6{
    0%{
        left:56%;
        top:0%;
    }
    100%{
        left:20%;
        top:50%;
    }
}

@keyframes move7{
    0%{
        right:250px;
        top:0;
    }
    100%{
        right:800px;

        top:400px;
    }
}
@keyframes move8{
    0%{
        right:10px;
        top:0;
    }
    100%{
        right:200px;
        top:500px;
    }
}
@keyframes move9{
    0%{
        bottom:10px;
        top:0;
    }
    100%{
        bottom:200px;
        top:500px;
    }
}
@keyframes move10{
    0%{
        right:10px;
        top:0;
    }
    100%{
        right:200px;
        top:500px;
    }
}
@keyframes move11{
    0%{
        right:10px;
        top:0;
    }
    100%{
        right:200px;
        top:500px;
    }
}
@keyframes move12{
    0%{
        right:10px;
        top:0;
    }
    100%{
        right:600px;
        top:500px;
    }
}
@keyframes move13{
    0%{
        right:10px;
        top:0;
    }
    100%{
        right:150px;
        top:500px;
    }
}
@keyframes move14{
    0%{
        right:10px;
        top:0;
    }
    100%{
        right:900px;
        top:500px;
    }
}
@keyframes move15{
    0%{
        right:100px;
        top:0;
    }
    100%{
        right:720px;
        top:500px;
    }
}
@keyframes move16{
    0%{
        right:500px;
        top:0;
    }
    100%{
        right:200px;
        top:500px;
    }
}
@keyframes move17{
    0%{
        right:100px;
        top:0;
    }
    100%{
        right:200px;
        top:500px;
    }
}
</style>
</head>
<body>

<div class="ball ball1"></div>
<div class="ball ball2"></div>
<div class="ball ball3"></div>
<div class="ball ball4"></div>
<div class="ball ball5"></div>
<div class="ball ball6"></div>
<div class="ball ball7"></div>
<div class="ball ball8"></div>
<div class="ball ball9"></div>
<div class="ball ball10"></div>
<div class="ball ball11"></div>

</body>
</html>
