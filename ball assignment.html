<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:#0d5dd4;
    position:relative;
    overflow:hidden;
}

.ball{
    width:60px;
    height:60px;
    background:red;
    border-radius:50%;
    position:absolute;
    animation:move 2s infinite alternate ease-in-out;
}

@keyframes move{
    0%{
        top:0;
    }

    100%{
        top: 700px;
    }
}
</style>
</head>

<body>
    <div class="ball"></div>
</body>
</html>
